name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...
      - name: test
        run: go test ./... -race -count=1

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # golangci-lint's prebuilt binaries lag the Go release and refuse to lint a
      # module targeting a newer Go than they were built with. Installing v2 from
      # source with the runner's Go sidesteps that (and guarantees the v2 config
      # schema via the /v2/ module path).
      - name: install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: lint
        run: golangci-lint run ./...
