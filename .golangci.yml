version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # correctness / bugs
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - bodyclose
    - errorlint
    - nilerr
    - nilnil
    - noctx
    - sqlclosecheck
    - rowserrcheck
    - contextcheck
    - durationcheck
    - makezero
    - reassign
    - wastedassign
    - exhaustive
    - copyloopvar
    - intrange
    - forcetypeassert
    - gocheckcompilerdirectives
    # complexity
    - gocyclo
    - gocognit
    - cyclop
    - funlen
    - nestif
    - maintidx
    # style / quality
    - revive
    - gocritic
    - unconvert
    - unparam
    - prealloc
    - misspell
    - whitespace
    - godot
    - usestdlibvars
    - predeclared
    - nakedret
    - godox
    - lll
    # tests
    - thelper
    - tparallel
    - testableexamples
  settings:
    gosec:
      excludes:
        - G304 # file paths come from the store/CLI by design
        - G204 # we shell out to git with controlled args by design
    lll:
      line-length: 140
    funlen:
      lines: 80
      statements: 60
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 25
    cyclop:
      max-complexity: 15
    nestif:
      min-complexity: 6
    godox:
      keywords: [FIXME, HACK, BUG]
    revive:
      rules:
        - name: blank-imports
        - name: package-comments
        - name: unused-parameter
        - name: exported
        - name: error-strings
        - name: error-return
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - dupl
          - godot
          - lll
          - errcheck
          - forcetypeassert

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
